name: wOS
options:
  bundleIdPrefix: com.wos
  deploymentTarget:
    iOS: "16.0"
  createIntermediateGroups: true
targets:
  wOS:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: Sources/wOS
    info:
      path: Support/Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.wos.app
        SWIFT_VERSION: "5.0"
        TARGETED_DEVICE_FAMILY: "1,2"
        ENABLE_PREVIEWS: YES
        CODE_SIGN_STYLE: Automatic
schemes:
  wOS:
    build:
      targets:
        wOS: all
    run:
      config: Debug
    archive:
      config: Release
